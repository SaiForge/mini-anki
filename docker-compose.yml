# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: minianki_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: minianki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: minianki_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/minianki
      - SECRET_KEY=super-secret-jwt-key-change-me-later
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app # Syncs your local code to the container for hot-reloading

  frontend:
    build: ./frontend
    container_name: minianki_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app # Syncs your local code for hot-reloading
      - /app/node_modules # Prevents local node_modules from overwriting container's

volumes:
  postgres_data:
