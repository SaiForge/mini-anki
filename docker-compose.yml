version: '3.8'

services:

  # ─── PostgreSQL 15 (Alpine) ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: minianki_db
    restart: always
    environment:
      POSTGRES_DB: minianki
      POSTGRES_USER: minianki_user
      POSTGRES_PASSWORD: minianki_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minianki_user -d minianki"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: minianki_redis
    restart: always
    ports:
      - "6379:6379"


  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: minianki_backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://minianki_user:minianki_pass@db:5432/minianki
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_BASE_URL=http://localhost:5173
      # SECURITY (Medium #11): Set to 'production' in Azure App Service to disable /docs and /redoc
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    # --reload removed: eliminates inotify file-watcher CPU overhead
    # --workers 2: handle concurrent requests without I/O blocking
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ─── Vite Frontend ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: minianki_frontend
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
